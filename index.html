<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Climate Leaderboard</title>
    
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6; /* Shared soft gray background */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #111827;
        }

        /* 2. Page Header Styling */
        header {
            width: 100%;
            background-color: #ffffff;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        header h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
            color: #111827;
        }

        .header-logo {
            font-weight: 800;
            font-size: 1.1rem;
            color: #3b82f6; /* Shared Blue Accent */
        }

        /* 3. Main Content Container - Centered */
        main {
            flex-grow: 1;
            width: 100%;
            max-width: 1200px; 
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centers the Hero text */
            justify-content: center; /* Centers content vertically if there is extra space */
        }

        .hero {
            text-align: center;
            margin-bottom: 4rem;
        }

        /* 4. Navigation Cards Grid - Centered & Width Constrained */
        .card-grid {
            display: grid;
            gap: 2rem;
            width: 100%;
            /* This ensures the grid itself doesn't stretch wider than its content 
               on huge screens, and margin: auto keeps it centered. */
            max-width: 1000px; 
            margin: 0 auto; 
            grid-template-columns: 1fr; 
        }

        /* Tablet (2 columns) */
        @media (min-width: 768px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
                /* If you have only 3 cards and want them to look balanced 
                   on a 2-column grid, you can use: */
                justify-content: center;
            }
        }

        /* Desktop (3 columns) */
        @media (min-width: 1024px) {
            .card-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* 5. Nav Card Styling - Ensure text alignment */
        .nav-card {
            display: flex;
            flex-direction: column;
            align-items: center; /* Centers the icon, title, and text inside the card */
            text-align: center;   /* Centers the text lines */
            text-decoration: none;
            background-color: #ffffff;
            border-radius: 12px;
            padding: 2.5rem 2rem;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease-in-out;
        }

        /* Modern Hover Interaction */
        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: #d1d5db;
        }

        /* Visual "Icon" for each card */
        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            background-color: #f3f4f6;
            color: #111827;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #111827;
        }

        .card-description {
            font-size: 0.95rem;
            color: #6b7280;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        /* Action Link styling inside the card */
        .card-action {
            display: inline-flex;
            align-items: center;
            color: #3b82f6; /* Shared Blue Accent */
            font-weight: 600;
            font-size: 0.95rem;
        }

        .card-action::after {
            content: '→';
            margin-left: 0.5rem;
            transition: transform 0.2s;
        }

        .nav-card:hover .card-action::after {
            transform: translateX(4px);
        }

        /* Page Footer */
        footer {
            width: 100%;
            padding: 3rem 2rem;
            border-top: 1px solid #e5e7eb;
            background-color: #ffffff;
            margin-top: auto;
            text-align: center;
            font-size: 0.875rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>

    <main>
        <div class="hero">
            <h2>Local Climate Leaderboard</h2>
            <p>Data over time for key statistics for Climate Action</p>
        </div>

        <div class="card-grid">
            
            <a href="./fleet_electrification/" class="nav-card">
                <h3 class="card-title">Fleet Electrification</h3>
            </a>

            <a href="./ghg_reduction" class="nav-card">
                <h3 class="card-title">Greenhouse Gas Emissions Reduction</h3>
            </a>

            <a href="./vmt_reduction" class="nav-card">
                <h3 class="card-title">Vehicle Miles Traveled Reduction</h3>
            </a>

        </div>
    </main>
</body>
</html>
