<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Graph Web Component</title>
    <style>
        /* Global styles for the page background */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f3f4f6;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

    <timeline-graph 
        title="Revenue Growth by City" 
        src="mock-data.csv">
    </timeline-graph>

    <script>
        class TimelineGraph extends HTMLElement {
            constructor() {
                super();
                // Attach a shadow root to encapsulate styling and markup
                this.attachShadow({ mode: 'open' });
            }

            // Define which attributes to observe for changes
            static get observedAttributes() {
                return ['src', 'title'];
            }

            async connectedCallback() {
                this.renderSkeleton();
                await this.loadChartJS();
                await this.fetchAndRenderData();
            }

            renderSkeleton() {
                // Modern, clean CSS using CSS variables and flexbox inside the Shadow DOM
                this.shadowRoot.innerHTML = `
                    <style>
                        :host {
                            display: block;
                            width: 100%;
                            max-width: 900px;
                            font-family: inherit;
                        }
                        .card {
                            background: #ffffff;
                            border-radius: 12px;
                            padding: 1.5rem;
                            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
                            border: 1px solid #e5e7eb;
                        }
                        .header {
                            margin-bottom: 1.5rem;
                            border-bottom: 1px solid #f3f4f6;
                            padding-bottom: 0.75rem;
                        }
                        .title {
                            margin: 0;
                            font-size: 1.25rem;
                            font-weight: 600;
                            color: #111827;
                        }
                        .chart-container {
                            position: relative;
                            height: 400px;
                            width: 100%;
                        }
                        .loading {
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            height: 100%;
                            color: #6b7280;
                            font-size: 0.875rem;
                        }
                    </style>
                    <div class="card">
                        <div class="header">
                            <h2 class="title">${this.getAttribute('title') || 'Timeline Graph'}</h2>
                        </div>
                        <div class="chart-container">
                            <div class="loading">Loading data...</div>
                            <canvas id="chart"></canvas>
                        </div>
                    </div>
                `;
            }

            // Dynamically load Chart.js so the component is self-contained
            loadChartJS() {
                return new Promise((resolve) => {
                    if (window.Chart) return resolve();
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/npm/chart.js';
                    script.onload = resolve;
                    document.head.appendChild(script);
                });
            }

            // Fetch the CSV, parse it, and construct the graph
            async fetchAndRenderData() {
                const src = this.getAttribute('src');
                if (!src) return;

                try {
                    // For the sake of this demo, we intercept "mock-data.csv"
                    // In production, this simply fetches your real URL.
                    let csvText = '';
                    if (src === 'mock-data.csv') {
                        csvText = this.getMockCSV();
                    } else {
                        const response = await fetch(src);
                        csvText = await response.text();
                    }

                    const data = this.parseCSV(csvText);
                    this.drawChart(data);
                } catch (error) {
                    const container = this.shadowRoot.querySelector('.chart-container');
                    container.innerHTML = `<div class="loading" style="color: #ef4444;">Error loading data</div>`;
                    console.error('Timeline component error:', error);
                }
            }

            // A lightweight CSV parser for: date, city, value, source
            parseCSV(csvText) {
                const lines = csvText.trim().split('\n');
                const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
                
                return lines.slice(1).map(line => {
                    const values = line.split(',');
                    return headers.reduce((obj, header, index) => {
                        obj[header] = values[index].trim();
                        return obj;
                    }, {});
                });
            }

            drawChart(data) {
                // Remove loading state
                const loadingEl = this.shadowRoot.querySelector('.loading');
                if (loadingEl) loadingEl.remove();

                const canvas = this.shadowRoot.getElementById('chart');
                const ctx = canvas.getContext('2d');

                // 1. Extract unique dates (X-axis) and sort them
                const dates = [...new Set(data.map(d => d.date))].sort();

                // 2. Extract unique cities (Groups/Lines)
                const cities = [...new Set(data.map(d => d.city))];

                // Modern color palette for the lines
                const colors = ['#3b82f6', '#10b981', '#f43f5e', '#f59e0b', '#8b5cf6'];

                // 3. Format data into Chart.js datasets
                const datasets = cities.map((city, index) => {
                    const color = colors[index % colors.length];
                    
                    // Map values to dates. If a city is missing a date, return null to break the line.
                    const cityData = dates.map(date => {
                        const record = data.find(d => d.city === city && d.date === date);
                        return record ? parseFloat(record.value) : null;
                    });

                    return {
                        label: city,
                        data: cityData,
                        borderColor: color,
                        backgroundColor: color,
                        borderWidth: 2,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: color,
                        pointHoverBackgroundColor: color,
                        pointHoverBorderColor: '#fff',
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        tension: 0.3 // Smooth curves
                    };
                });

                // 4. Initialize the Chart
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: dates,
                        datasets: datasets
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false,
                        },
                        plugins: {
                            legend: {
                                position: 'top',
                                labels: { usePointStyle: true, boxWidth: 8, font: { family: 'inherit' } }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(17, 24, 39, 0.9)',
                                titleFont: { family: 'inherit', size: 13 },
                                bodyFont: { family: 'inherit', size: 13 },
                                padding: 10,
                                cornerRadius: 8,
                                callbacks: {
                                    // Optionally append the 'source' to the tooltip
                                    afterLabel: (context) => {
                                        const city = context.dataset.label;
                                        const date = context.label;
                                        const record = data.find(d => d.city === city && d.date === date);
                                        return record && record.source ? `Source: ${record.source}` : '';
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: { display: false },
                                ticks: { font: { family: 'inherit' }, color: '#6b7280' }
                            },
                            y: {
                                border: { display: false },
                                grid: { color: '#f3f4f6' },
                                ticks: { font: { family: 'inherit' }, color: '#6b7280' }
                            }
                        }
                    }
                });
            }

            // Helper to provide mock data if no external CSV is provided
            getMockCSV() {
                return `date,city,value,source
2023-01-01,New York,120,Internal
2023-01-01,London,85,External
2023-01-01,Tokyo,150,Internal
2023-02-01,New York,135,Internal
2023-02-01,London,90,External
2023-02-01,Tokyo,145,Internal
2023-03-01,New York,160,Internal
2023-03-01,London,110,External
2023-03-01,Tokyo,165,Internal
2023-04-01,New York,140,Internal
2023-04-01,London,115,External
2023-04-01,Tokyo,180,Internal`;
            }
        }

        // Register the custom element with the browser
        customElements.define('timeline-graph', TimelineGraph);
    </script>
</body>
</html>
